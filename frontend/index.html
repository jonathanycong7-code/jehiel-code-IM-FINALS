<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login_container">

    <div class="login_card">

        <h1>Student Record</h1>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="login()">
            Login
        </button>

        <p id="message"></p>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
